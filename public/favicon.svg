<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f2d4a"/>
      <stop offset="100%" stop-color="#060f1c"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#aceaff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#76d2ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#aceaff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="url(#bgGrad)" />

  <!-- Neural network connection lines (thin, subtle) -->
  <!-- Center to inner ring nodes -->
  <line x1="32" y1="32" x2="32" y2="14" stroke="#aceaff" stroke-width="0.7" stroke-opacity="0.35"/>
  <line x1="32" y1="32" x2="46.1" y2="23" stroke="#aceaff" stroke-width="0.7" stroke-opacity="0.35"/>
  <line x1="32" y1="32" x2="46.1" y2="41" stroke="#aceaff" stroke-width="0.7" stroke-opacity="0.35"/>
  <line x1="32" y1="32" x2="32" y2="50" stroke="#aceaff" stroke-width="0.7" stroke-opacity="0.35"/>
  <line x1="32" y1="32" x2="17.9" y2="41" stroke="#aceaff" stroke-width="0.7" stroke-opacity="0.35"/>
  <line x1="32" y1="32" x2="17.9" y2="23" stroke="#aceaff" stroke-width="0.7" stroke-opacity="0.35"/>

  <!-- Inner ring to inner ring (hexagonal) -->
  <line x1="32" y1="14" x2="46.1" y2="23" stroke="#aceaff" stroke-width="0.5" stroke-opacity="0.20"/>
  <line x1="46.1" y1="23" x2="46.1" y2="41" stroke="#aceaff" stroke-width="0.5" stroke-opacity="0.20"/>
  <line x1="46.1" y1="41" x2="32" y2="50" stroke="#aceaff" stroke-width="0.5" stroke-opacity="0.20"/>
  <line x1="32" y1="50" x2="17.9" y2="41" stroke="#aceaff" stroke-width="0.5" stroke-opacity="0.20"/>
  <line x1="17.9" y1="41" x2="17.9" y2="23" stroke="#aceaff" stroke-width="0.5" stroke-opacity="0.20"/>
  <line x1="17.9" y1="23" x2="32" y2="14" stroke="#aceaff" stroke-width="0.5" stroke-opacity="0.20"/>

  <!-- Outer micro dots (ring) -->
  <circle cx="32"    cy="6"    r="1.2" fill="#aceaff" opacity="0.40"/>
  <circle cx="52.4"  cy="14"   r="1.0" fill="#aceaff" opacity="0.30"/>
  <circle cx="58"    cy="32"   r="1.2" fill="#aceaff" opacity="0.40"/>
  <circle cx="52.4"  cy="50"   r="1.0" fill="#aceaff" opacity="0.30"/>
  <circle cx="32"    cy="58"   r="1.2" fill="#aceaff" opacity="0.40"/>
  <circle cx="11.6"  cy="50"   r="1.0" fill="#aceaff" opacity="0.30"/>
  <circle cx="6"     cy="32"   r="1.2" fill="#aceaff" opacity="0.40"/>
  <circle cx="11.6"  cy="14"   r="1.0" fill="#aceaff" opacity="0.30"/>

  <!-- Inner ring nodes (hexagon) -->
  <circle cx="32"    cy="14"   r="2.8" fill="#ffffff" opacity="0.85" filter="url(#glow)"/>
  <circle cx="46.1"  cy="23"   r="2.8" fill="#ffffff" opacity="0.85" filter="url(#glow)"/>
  <circle cx="46.1"  cy="41"   r="2.8" fill="#ffffff" opacity="0.85" filter="url(#glow)"/>
  <circle cx="32"    cy="50"   r="2.8" fill="#ffffff" opacity="0.85" filter="url(#glow)"/>
  <circle cx="17.9"  cy="41"   r="2.8" fill="#ffffff" opacity="0.85" filter="url(#glow)"/>
  <circle cx="17.9"  cy="23"   r="2.8" fill="#ffffff" opacity="0.85" filter="url(#glow)"/>

  <!-- Core glow halo -->
  <circle cx="32" cy="32" r="9" fill="url(#coreGlow)" opacity="0.25"/>

  <!-- Center core dot -->
  <circle cx="32" cy="32" r="5.5" fill="#aceaff" filter="url(#glow)" opacity="0.95"/>
  <circle cx="32" cy="32" r="3.5" fill="#ffffff"/>
</svg>
